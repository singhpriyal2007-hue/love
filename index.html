<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Priyal ❤️</title>
<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to right, #ff6a88, #ff99ac);
  color: #fff;
  text-align: center;
}.page { display: none; min-height: 100vh; justify-content: center; align-items: center; flex-direction: column; padding: 40px 20px; }

.active { display: flex; }

button { margin-top: 30px; padding: 14px 28px; border: none; border-radius: 25px; background: #fff; color: #ff4f81; font-size: 18px; cursor: pointer; }

h1 { font-size: 2.5em; } p { font-size: 1.2em; max-width: 500px; }

img { width: 260px; border-radius: 20px; margin-top: 20px; } </style>

</head>
<body><div id="page1" class="page active">
  <h1>Hey Priyal ❤️</h1>
  <p>Tap below... I have something for you 💫</p>
  <button onclick="nextPage(2)">Start 💖</button>
</div><div id="page2" class="page">
  <h1>You Are Beautiful 😍</h1>
  <img src="photo1.jpg">
  <p>You make everything better just by being you.</p>
  <button onclick="nextPage(3)">Next ➡️</button>
</div><div id="page3" class="page">
  <h1>Us 💑</h1>
  <img src="photo2.jpg">
  <p>Being with you feels right.</p>
  <button onclick="nextPage(4)">Next ➡️</button>
</div><div id="page4" class="page">
  <h1>Why I Love You 💕</h1>
  <p>
  • Your smile 😊<br>
  • Your care ❤️<br>
  • Your vibe 💫
  </p>
  <button onclick="nextPage(5)">Next ➡️</button>
</div><div id="page5" class="page">
  <h1>I Love You Priyal ❤️</h1>
  <p>Forever with you 💖</p>
</div><script>
function nextPage(n) {
  var pages = document.querySelectorAll('.page');
  pages.forEach(function(p){ p.classList.remove('active'); });
  document.getElementById('page'+n).classList.add('active');
}
</script></body>
</html>
